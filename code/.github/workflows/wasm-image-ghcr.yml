name: Build and Push WASM Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wasip2test/**"
      - ".github/workflows/wasm-image-ghcr.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/wasip2test

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WASM component with TinyGo
        run: |
          docker run --rm \
            -v "$PWD/wasip2test:/src" \
            -w /src \
            tinygo/tinygo:0.39.0 \
            tinygo build -target=wasip2-http.json -o main.wasm main.go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./wasip2test
          file: ./wasip2test/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
