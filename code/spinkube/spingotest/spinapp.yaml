apiVersion: core.spinkube.dev/v1alpha1
kind: SpinApp
metadata:
  name: spingotest
  namespace: default
spec:
  image: ghcr.io/thomas-more-digital-innovation/spingotest:latest
  enableAutoscaling: true
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  # Uncomment if the GHCR package is private.
  # imagePullSecrets:
  #   - name: ghcr-creds

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spingotest
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spingotest
  minReplicas: 1
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 10
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 10
        - type: Pods
          value: 10
          periodSeconds: 10
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 200
          periodSeconds: 10
        - type: Pods
          value: 10
          periodSeconds: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
