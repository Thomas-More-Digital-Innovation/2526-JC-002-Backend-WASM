name: Publish Spin App to GHCR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  APP_DIR: code/spinkube/spingotest
  APP_NAME: spingotest

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Spin
        uses: fermyon/actions/spin/setup@v1

      - name: Install TinyGo
        env:
          TINYGO_VERSION: "0.39.0"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb" -o /tmp/tinygo.deb
          sudo dpkg -i /tmp/tinygo.deb
          tinygo version

      - name: Build Spin app
        run: |
          set -euo pipefail
          cd "${APP_DIR}"
          spin build

      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          spin registry login ghcr.io -u "${GHCR_USER}" -p "${GHCR_TOKEN}"

      - name: Set artifact name
        id: vars
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "artifact=ghcr.io/${OWNER_LC}/${APP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Push Spin OCI artifact
        env:
          ARTIFACT: ${{ steps.vars.outputs.artifact }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          cd "${APP_DIR}"

          TAGS=("sha-${SHA::7}")

          if [[ "${REF_TYPE}" == "tag" ]]; then
            TAGS+=("${REF_NAME}")
          fi

          if [[ "${REF_TYPE}" == "branch" && "${REF_NAME}" == "main" ]]; then
            TAGS+=("latest")
          fi

          for tag in "${TAGS[@]}"; do
            spin registry push "${ARTIFACT}:${tag}"
            echo "Pushed ${ARTIFACT}:${tag}" >> "${GITHUB_STEP_SUMMARY}"
          done
